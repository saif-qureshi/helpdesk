name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy values so Prisma CLI / generate run without a real database.
      DATABASE_URL: postgresql://user:password@localhost:5432/helpdesk
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client + tenant models
        run: pnpm db:generate

      - name: Ensure generated tenant-models are in sync with the schema
        run: git diff --exit-code lib/infra/tenant-models.generated.ts

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
